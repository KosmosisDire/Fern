name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install LLVM and system dependencies
      run: |
        sudo apt update
        sudo apt install -y zlib1g-dev libcurl4-openssl-dev libedit-dev libzstd-dev llvm-19 llvm-19-dev

    - name: Configure CMake (Linux)
      run: |
        cmake --preset github-actions-linux -DLLVM_DIR=/usr/lib/llvm-19/lib/cmake/llvm
        
    - name: Build (Linux)
      run: |
        cmake --build build --config Release

    - name: Package Linux binaries
      run: |
        mkdir -p artifacts/linux
        cp build/ferncli artifacts/linux/ferncli-linux-x64
        cp build/fernlsp artifacts/linux/fernlsp-linux-x64
        chmod +x artifacts/linux/ferncli-linux-x64
        chmod +x artifacts/linux/fernlsp-linux-x64

    - name: Upload Linux CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: ferncli-linux-x64
        path: artifacts/linux/ferncli-linux-x64

    - name: Upload Linux LSP artifact
      uses: actions/upload-artifact@v4
      with:
        name: fernlsp-linux-x64
        path: artifacts/linux/fernlsp-linux-x64

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download LLVM with development headers
      run: |
        # Download LLVM 18.1.8 from vovkos/llvm-package-windows which includes headers
        $llvmUrl = "https://github.com/vovkos/llvm-package-windows/releases/download/llvm-18.1.8/llvm-18.1.8-windows-amd64-msvc17-msvcrt.7z"
        $llvmPath = "${{ runner.temp }}/llvm"
        
        Write-Host "Downloading LLVM 18.1.8 with development headers..."
        Invoke-WebRequest -Uri $llvmUrl -OutFile "${{ runner.temp }}/llvm.7z"
        
        Write-Host "Extracting LLVM..."
        7z x "${{ runner.temp }}/llvm.7z" -o"$llvmPath"
        
        Write-Host "LLVM extracted to: $llvmPath"
        
        # Set environment variable for subsequent steps
        echo "LLVM_PATH=$llvmPath/llvm-18.1.8-windows-amd64-msvc17-msvcrt" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      
    - name: Configure CMake (Windows)
      run: |
        cmake --preset github-actions-windows -DLLVM_DIR="${env:LLVM_PATH}/lib/cmake/llvm" -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
      env:
        VCPKG_ROOT: C:\dev\null
        
    - name: Build (Windows)
      run: |
        cmake --build build/Release --config Release

    - name: Package Windows binaries
      run: |
        mkdir artifacts\windows
        copy build\Release\ferncli.exe artifacts\windows\ferncli-windows-x64.exe
        copy build\Release\fernlsp.exe artifacts\windows\fernlsp-windows-x64.exe

    - name: Upload Windows CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: ferncli-windows-x64
        path: artifacts/windows/ferncli-windows-x64.exe

    - name: Upload Windows LSP artifact
      uses: actions/upload-artifact@v4
      with:
        name: fernlsp-windows-x64
        path: artifacts/windows/fernlsp-windows-x64.exe

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Linux CLI artifact
      uses: actions/download-artifact@v4
      with:
        name: ferncli-linux-x64
        path: ./

    - name: Download Linux LSP artifact
      uses: actions/download-artifact@v4
      with:
        name: fernlsp-linux-x64
        path: ./

    - name: Download Windows CLI artifact
      uses: actions/download-artifact@v4
      with:
        name: ferncli-windows-x64
        path: ./

    - name: Download Windows LSP artifact
      uses: actions/download-artifact@v4
      with:
        name: fernlsp-windows-x64
        path: ./

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ferncli-linux-x64
          fernlsp-linux-x64
          ferncli-windows-x64.exe
          fernlsp-windows-x64.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}